services:
  db:
    image: postgres:16-alpine
    container_name: calc-tutor-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-calc_tutor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-calc_tutor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: calc-tutor-backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-calc_tutor}
      CORS_ORIGINS: http://localhost:5173,http://localhost:${FRONTEND_PORT:-8080},http://localhost
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-deepseek-r1:8b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-120}
      OCR_PROVIDER: ${OCR_PROVIDER:-tesseract}
      OCR_LANGUAGE: eng
      KNOWLEDGE_DATASETS_DIR: ${KNOWLEDGE_DATASETS_DIR:-/knowledge/datasets}
      RAG_TOP_K: ${RAG_TOP_K:-4}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    container_name: calc-tutor-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: calc-tutor-proxy
    profiles: ["proxy"]
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: calc-tutor-ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
